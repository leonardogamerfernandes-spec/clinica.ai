services:
  postgres:
    image: postgres:15-alpine
    container_name: novosaas_postgres
    environment:
      POSTGRES_USER: clinicai
      POSTGRES_PASSWORD: clinicai_password
      POSTGRES_DB: clinicai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicai -d clinicai_db"]
      interval: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: novosaas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: novosaas_evolution
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - API_KEY=clinicai_secret_key
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=clinicai_secret_key
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://clinicai:clinicai_password@postgres:5432/clinicai_db?schema=evolution
    volumes:
      - evolution_data:/evolution/instances

volumes:
  postgres_data:
  redis_data:
  evolution_data:
